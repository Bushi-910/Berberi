<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salloni i Berberit | Rezervime Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-sans min-h-screen p-6 flex flex-col justify-between">
    
    <div id="homeView" class="flex flex-col items-center text-center my-auto max-w-md mx-auto w-full">
        <div class="w-20 h-20 bg-zinc-900 border border-zinc-800 rounded-full flex items-center justify-center mb-6"><span class="text-2xl">✂️</span></div>
        <h2 class="text-3xl font-extrabold tracking-tight mb-2">Salloni i Berberit</h2>
        <button onclick="switchView('booking')" class="w-full bg-white text-black py-4 uppercase text-sm font-bold tracking-wider mb-3">Rezervo Tani</button>
        <button onclick="switchView('cancel')" class="w-full bg-zinc-900 text-zinc-400 py-4 uppercase text-sm font-bold tracking-wider hover:text-white">Anulo Rezervimin</button>
    </div>

    <div id="bookingView" class="hidden w-full max-w-md mx-auto my-auto">
        <button onclick="switchView('home')" class="text-xs text-zinc-400 mb-6">← Kthehu</button>
        <h2 class="text-2xl font-bold mb-6 uppercase tracking-wide">Zgjidh Orarin</h2>
        <div id="dateButtonsContainer" class="flex gap-2 mb-6"></div>
        <div id="slotsContainer" class="grid grid-cols-3 gap-2 mb-8"></div>
        <div id="bookingForm" class="hidden border-t border-zinc-900 pt-6">
            <input type="text" id="custName" placeholder="Emri Juaj" class="w-full bg-zinc-900 border border-zinc-800 p-4 mb-3 text-white">
            <input type="tel" id="custPhone" placeholder="Numri i Telefonit" class="w-full bg-zinc-900 border border-zinc-800 p-4 mb-6 text-white">
            <button id="submitBooking" class="w-full bg-white text-black py-4 uppercase text-sm font-bold">Konfirmo Rezervimin</button>
        </div>
    </div>

    <div id="cancelView" class="hidden w-full max-w-md mx-auto my-auto">
        <button onclick="switchView('home')" class="text-xs text-zinc-400 mb-6">← Kthehu</button>
        <h2 class="text-2xl font-bold mb-6 uppercase tracking-wide text-red-500">Anulo Rezervimin</h2>
        <input type="text" id="cancelName" placeholder="Emri i përdorur" class="w-full bg-zinc-900 border border-zinc-800 p-4 mb-3 text-white">
        <input type="tel" id="cancelPhone" placeholder="Numri i Telefonit" class="w-full bg-zinc-900 border border-zinc-800 p-4 mb-6 text-white">
        <button id="submitCancel" class="w-full bg-red-600 text-white py-4 uppercase text-sm font-bold hover:bg-red-700">Fshi Rezervimin</button>
        <p id="cancelStatus" class="mt-4 text-center hidden p-3 bg-green-900 text-green-200 border border-green-700"></p>
    </div>

    <script>
        let selectedDate = null;
        let selectedTime = null;

        function switchView(view) {
            document.getElementById('homeView').classList.add('hidden');
            document.getElementById('bookingView').classList.add('hidden');
            document.getElementById('cancelView').classList.add('hidden');
            document.getElementById(view + 'View').classList.remove('hidden');
            if(view === 'booking') generateDateButtons();
        }

        function generateDateButtons() {
            const container = document.getElementById('dateButtonsContainer');
            container.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                let d = new Date();
                d.setDate(d.getDate() + i);
                const dateStr = d.toISOString().split('T')[0];
                const btn = document.createElement('button');
                btn.className = 'date-btn flex-1 bg-zinc-900 border border-zinc-800 text-xs py-3 text-center';
                btn.innerHTML = `<span class="block font-bold">${i===0?'Sot':i===1?'Nesër':'Pasnesër'}</span>`;
                btn.onclick = () => {
                    document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('bg-white', 'text-black'));
                    btn.classList.add('bg-white', 'text-black');
                    selectedDate = dateStr;
                    loadSlots();
                };
                container.appendChild(btn);
            }
        }

        async function loadSlots() {
            const container = document.getElementById('slotsContainer');
            container.innerHTML = '<p class="text-xs text-zinc-500">Po ngarkohen oraret...</p>';
            const allSlots = ['09:00', '10:00', '11:00', '12:00', '14:00', '15:00', '16:00', '17:00', '18:00', '19:00', '20:00', '21:00'];
            
            try {
                const res = await fetch(`/api/slots?date=${selectedDate}`);
                const slots = await res.json();
                renderSlots(slots.length > 0 ? slots : allSlots);
            } catch (err) {
                renderSlots(allSlots);
            }
        }

        function renderSlots(slots) {
            const container = document.getElementById('slotsContainer');
            container.innerHTML = '';
            slots.forEach(time => {
                const btn = document.createElement('button');
                btn.className = 'bg-zinc-900 border border-zinc-800 text-sm py-3';
                btn.textContent = time;
                btn.onclick = () => {
                    document.querySelectorAll('#slotsContainer button').forEach(b => b.classList.remove('bg-white', 'text-black'));
                    btn.classList.add('bg-white', 'text-black');
                    selectedTime = time;
                    document.getElementById('bookingForm').classList.remove('hidden');
                };
                container.appendChild(btn);
            });
        }

        document.getElementById('submitBooking').onclick = async () => {
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;
            const res = await fetch('/api/bookings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ customer_name: name, phone, date: selectedDate, time: selectedTime })
            });
            alert('Rezervuar me sukses!');
            window.location.reload();
        };

        document.getElementById('submitCancel').onclick = async () => {
            const name = document.getElementById('cancelName').value;
            const phone = document.getElementById('cancelPhone').value;
            const res = await fetch('/api/delete-booking', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ customer_name: name, phone })
            });
            const data = await res.json();
            const status = document.getElementById('cancelStatus');
            status.textContent = data.success ? "✅ Rezervimi u fshi!" : "❌ " + data.error;
            status.classList.remove('hidden');
        };
    </script>
</body>
</html>
