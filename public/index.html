<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berberi</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-6">
    <div id="bookingView">...</div> 

    <div class="mt-10 border-t border-zinc-800 pt-6">
        <h3 class="text-sm font-bold uppercase mb-4">Anulo Rezervimin</h3>
        <input type="text" id="cancelName" placeholder="Emri" class="w-full p-3 mb-2 bg-zinc-900 text-white">
        <input type="text" id="cancelPhone" placeholder="Telefoni" class="w-full p-3 mb-4 bg-zinc-900 text-white">
        <button onclick="handleCancel()" class="w-full bg-red-800 p-3 font-bold uppercase">Anulo</button>
    </div>

    <script>
        async function handleCancel() {
            const name = document.getElementById('cancelName').value;
            const phone = document.getElementById('cancelPhone').value;
            const today = new Date().toISOString().split('T')[0];
            const res = await fetch(`/api/admin/bookings?date=${today}`);
            const bookings = await res.json();
            const found = bookings.find(b => b.customer_name === name && b.phone === phone);
            if(found) {
                await fetch(`/api/admin/bookings/${found.id}`, { method: 'PATCH', headers: {'Content-Type':'application/json'}, body: JSON.stringify({status:'cancelled'})});
                alert("Rezervimi u anulua!");
            } else { alert("Nuk u gjet!"); }
        }
    </script>
</body>
</html>
