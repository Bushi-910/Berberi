<!DOCTYPE html>
<html>
<body style="background:black; color:white; padding:20px;">
    <h2>Rezervimet</h2>
    <table border="1" id="adminTable" style="width:100%; border-collapse:collapse;">
        <tr><th>Klienti</th><th>Telefoni</th><th>Data</th><th>Ora</th></tr>
    </table>
    <script>
        async function loadData() {
            const res = await fetch('/api/admin/all');
            const data = await res.json();
            const table = document.getElementById('adminTable');
            data.forEach(b => {
                table.innerHTML += `<tr><td>${b.customer_name}</td><td>${b.phone}</td><td>${b.date}</td><td>${b.time}</td></tr>`;
            });
        }
        loadData();
    </script>
</body>
</html>
