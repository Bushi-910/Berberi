<!DOCTYPE html>
<html lang="sq">
<body class="bg-black text-white p-6 font-sans">
    <h2 class="text-xl mb-4">Rezervimet</h2>
    <table id="tbl" class="w-full text-left border-collapse">
        <tr><th>Klienti</th><th>Telefoni</th><th>Dita</th><th>Ora</th></tr>
    </table>
    <script>
        fetch('/api/admin/all').then(r => r.json()).then(data => {
            const tbl = document.getElementById('tbl');
            const d = ["Diel", "Hënë", "Martë", "Mërkurë", "Enjte", "Premte", "Shtunë"];
            data.forEach(b => {
                tbl.innerHTML += `<tr class="border-b border-zinc-800"><td>${b.customer_name}</td><td>${b.phone}</td><td>${d[new Date(b.date).getDay()]}</td><td>${b.time}</td></tr>`;
            });
        });
    </script>
</body>
</html>
