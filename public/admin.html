<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin</title>
</head>
<body style="font-family:sans-serif; padding:10px;">
    <h1>Rezervimet</h1>
    <table border="1" width="100%">
        <thead><tr><th>Klienti</th><th>Ora</th><th>Veprim</th></tr></thead>
        <tbody id="bookingsBody"></tbody>
    </table>
    <script>
        async function update(id, status) {
            await fetch(`/api/admin/bookings/${id}`, { method: 'PATCH', headers: {'Content-Type':'application/json'}, body: JSON.stringify({status})});
            location.reload();
        }
        async function fetchBookings() {
            const today = new Date().toISOString().split('T')[0];
            const res = await fetch(`/api/admin/bookings?date=${today}`);
            const data = await res.json();
            document.getElementById('bookingsBody').innerHTML = data.map(b => `
                <tr><td>${b.customer_name}</td><td>${b.time}</td>
                <td><button onclick="update(${b.id}, 'confirmed')">Konfirmo</button>
                    <button onclick="update(${b.id}, 'cancelled')">Anulo</button></td></tr>
            `).join('');
        }
        fetchBookings();
    </script>
</body>
</html>
