<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barber Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-sans min-h-screen p-6">
    <div id="loginView" class="hidden max-w-sm mx-auto my-32">
        <h2 class="text-xl font-bold mb-6 text-center uppercase tracking-widest">Hyrja e Berberit</h2>
        <div class="bg-zinc-900 border border-zinc-800 p-6 space-y-4">
            <input type="email" id="email" placeholder="Email" class="w-full bg-black border border-zinc-800 p-4 text-sm text-white focus:outline-none">
            <input type="password" id="password" placeholder="Fjalëkalimi" class="w-full bg-black border border-zinc-800 p-4 text-sm text-white focus:outline-none">
            <button id="loginBtn" class="w-full bg-white text-black py-4 font-bold uppercase text-xs tracking-wider">Hyr</button>
        </div>
    </div>

    <div id="dashView" class="hidden max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-8 border-b border-zinc-900 pb-4">
            <h2 class="text-xl font-bold uppercase tracking-wider">Paneli i Rezervimeve</h2>
            <button onclick="logout()" class="text-xs text-red-400 uppercase tracking-wider">Dil</button>
        </header>
        <div class="mb-6"><input type="date" id="dashDate" class="bg-zinc-900 border border-zinc-800 p-3 text-sm text-white focus:outline-none"></div>
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="border-b border-zinc-800 text-xs text-zinc-500 uppercase tracking-wider">
                        <th class="py-3">Ora</th><th class="py-3">Klienti</th><th class="py-3">Telefon</th><th class="py-3">Statusi</th><th class="py-3 text-right">Aksione</th>
                    </tr>
                </thead>
                <tbody id="bookingsTable" class="text-sm divide-y divide-zinc-900"></tbody>
            </table>
        </div>
    </div>

    <script>
        const dashDate = document.getElementById('dashDate');
        dashDate.value = new Date().toISOString().split('T')[0];

        function checkAuth() {
            if(localStorage.getItem('barberAuth') === 'true') {
                document.getElementById('loginView').classList.add('hidden');
                document.getElementById('dashView').classList.remove('hidden');
                fetchBookings();
            } else {
                document.getElementById('dashView').classList.add('hidden');
                document.getElementById('loginView').classList.remove('hidden');
            }
        }

        document.getElementById('loginBtn').onclick = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if(data.success) {
                    localStorage.setItem('barberAuth', 'true');
                    checkAuth();
                } else { alert(data.error || 'Të dhëna të gabuara!'); }
            } catch (err) {
                alert('Gabim gjatë lidhjes me serverin.');
            }
        };

        function logout() { localStorage.clear(); checkAuth(); }

        async function fetchBookings() {
            try {
                const res = await fetch(`/api/admin/bookings?date=${dashDate.value}`);
                const bookings = await res.json();
                renderTable(bookings);
            } catch (err) {
                renderTable([]);
            }
        }

        function renderTable(bookings) {
            const tbody = document.getElementById('bookingsTable');
            tbody.innerHTML = bookings.length === 0 ? `<tr><td colspan="5" class="py-6 text-zinc-600 text-center text-xs">S'ka rezervime për këtë datë.</td></tr>` : '';

            bookings.forEach(b => {
                let color = b.status === 'confirmed' ? 'text-blue-400' : b.status === 'done' ? 'text-green-400' : b.status === 'cancelled' ? 'text-red-500' : 'text-yellow-500';
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="py-4 font-bold">${b.time}</td><td>${b.customer_name}</td><td class="text-zinc-400">${b.phone}</td><td class="uppercase text-xs font-semibold ${color}">${b.status}</td>
                    <td class="py-4 text-right space-x-2">
                        ${b.status === 'pending' ? `<button onclick="update(${b.id}, 'confirmed')" class="text-xs bg-zinc-800 px-3 py-1 hover:bg-white hover:text-black">Confirm</button>` : ''}
                        ${b.status === 'confirmed' ? `<button onclick="update(${b.id}, 'done')" class="text-xs bg-green-900 text-green-200 px-3 py-1">Done</button>` : ''}
                        ${b.status !== 'cancelled' && b.status !== 'done' ? `<button onclick="update(${b.id}, 'cancelled')" class="text-xs text-red-400">Cancel</button>` : ''}
                    </td>`;
                tbody.appendChild(tr);
            });
        }

        async function update(id, status) {
            try {
                const res = await fetch(`/api/admin/bookings/${id}`, { 
                    method: 'PATCH', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ status }) 
                });
                const data = await res.json();
                if(data.success) fetchBookings();
            } catch (err) {
                alert('Gabim gjatë ndryshimit të statusit.');
            }
        }

        dashDate.onchange = fetchBookings;
        checkAuth();
    </script>
</body>
</html>
